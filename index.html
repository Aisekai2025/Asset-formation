<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeNavigator 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
</head>
<body class="bg-slate-50 text-slate-800 p-4">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-2xl p-6 space-y-6 border border-slate-100">
        <h1 class="text-xl font-black text-indigo-700 text-center tracking-tight">LifeNavigator 2026</h1>

        <!-- 入力エリア -->
        <div class="space-y-5">
            <div class="bg-slate-50 p-3 rounded-2xl">
                <label class="flex justify-between text-xs font-bold mb-2 text-slate-500">月収（総支給）: <span id="val-income" class="text-lg text-indigo-600">30</span><span class="text-xs text-indigo-600">万円</span></label>
                <input type="range" id="input-income" min="15" max="100" value="30" class="w-full h-2 bg-indigo-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" oninput="calculate()">
            </div>
            <div class="bg-slate-50 p-3 rounded-2xl">
                <label class="flex justify-between text-xs font-bold mb-2 text-slate-500">店舗・生活スタイル: <span id="label-store" class="text-sm text-indigo-600">自炊派（スーパー）</span></label>
                <input type="range" id="input-store" min="0" max="2" value="0" class="w-full h-2 bg-indigo-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" oninput="calculate()">
            </div>
            <div class="bg-slate-50 p-3 rounded-2xl">
                <label class="flex justify-between text-xs font-bold mb-2 text-slate-500">投資に回す割合: <span id="val-invest" class="text-lg text-indigo-600">10</span><span class="text-xs text-indigo-600">%</span></label>
                <input type="range" id="input-invest" min="0" max="50" value="10" class="w-full h-2 bg-indigo-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" oninput="calculate()">
            </div>
        </div>

        <!-- 結果表示 -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-indigo-600 text-white p-4 rounded-2xl shadow-lg">
                <p class="text-[10px] opacity-80 font-bold">10年後の資産増</p>
                <p class="text-xl font-black" id="res-assets">¥0</p>
            </div>
            <div class="bg-emerald-500 text-white p-4 rounded-2xl shadow-lg">
                <p class="text-[10px] opacity-80 font-bold">推定健康スコア</p>
                <p class="text-xl font-black"><span id="res-health">80</span>点</p>
            </div>
        </div>

        <!-- グラフ -->
        <div style="height: 180px;">
            <canvas id="growthChart"></canvas>
        </div>

        <div id="advice-box" class="text-xs p-4 rounded-2xl bg-slate-900 text-slate-200 leading-relaxed shadow-inner">
            スライダーを動かして未来を予測しましょう。
        </div>
    </div>

    <script>
        let myChart = null;

        function initChart() {
            const ctx = document.getElementById('growthChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['今', '2年', '4年', '6年', '8年', '10年'],
                    datasets: [{
                        data: [0, 0, 0, 0, 0, 0],
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { display: false } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function calculate() {
            // 入力値の取得
            const income = parseInt(document.getElementById('input-income').value);
            const storeMode = parseInt(document.getElementById('input-store').value);
            const investRate = parseInt(document.getElementById('input-invest').value) / 100;

            // ラベル更新
            document.getElementById('val-income').innerText = income;
            document.getElementById('val-invest').innerText = Math.round(investRate * 100);
            
            const storeLabels = ["自炊派（スーパー）", "混合派（ドラッグストア等）", "外食・コンビニ派"];
            document.getElementById('label-store').innerText = storeLabels[storeMode];

            // 1. FPロジック：手取り（2026年想定）と投資余力の計算
            const takeHome = income * 0.78; // 社会保険・税金
            const storeCosts = [4, 7, 10]; // 店舗形態別の月間食費コスト（単位：万円）
            const monthlyInvest = (takeHome - storeCosts[storeMode]) * investRate;
            
            // 2. 資産推移（年利5%想定）
            let assetsOverTime = [];
            let currentBalance = 0;
            for (let year = 0; year <= 10; year++) {
                if (year % 2 === 0) assetsOverTime.push(Math.round(currentBalance));
                currentBalance = (currentBalance + (Math.max(0, monthlyInvest) * 12)) * 1.05;
            }

            // 3. 管理栄養士ロジック：健康寿命スコア
            const healthScores = [92, 75, 58];
            document.getElementById('res-health').innerText = healthScores[storeMode];
            document.getElementById('res-assets').innerText = "¥" + Math.round(currentBalance).toLocaleString() + "万";

            // グラフとアドバイスの更新
            if (myChart) {
                myChart.data.datasets[0].data = assetsOverTime;
                myChart.update();
            }

            const advice = document.getElementById('advice-box');
            if (storeMode === 2) {
                advice.innerHTML = "<span class='text-red-400'>⚠️警告:</span> コンビニ中心は食費を月" + (storeCosts[2] - storeCosts[0]) + "万円押し上げ、資産形成を阻害します。";
            } else if (investRate < 0.05) {
                advice.innerHTML = "💡ヒント: 投資率をあと5%上げるだけで、10年後はさらに大きな資産になります。";
            } else {
                advice.innerHTML = "✨理想的: 節約と投資、健康のバランスが取れています。この習慣を継続しましょう。";
            }
        }

        window.onload = () => {
            initChart();
            calculate();
        };
    </script>
</body>
</html>
