<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeNavigator 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
</head>
<body class="bg-slate-50 text-slate-800 p-4">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-6 space-y-6">
        <h1 class="text-xl font-bold text-indigo-700 text-center">LifeNavigator 2026</h1>

        <!-- 入力エリア -->
        <div class="space-y-4">
            <div>
                <label class="flex justify-between text-sm mb-1">月収: <span id="val-income" class="font-bold">30</span>万円</label>
                <input type="range" id="input-income" min="15" max="100" value="30" class="w-full h-2 bg-indigo-100 rounded-lg appearance-none cursor-pointer" oninput="update()">
            </div>
            <div>
                <label class="flex justify-between text-sm mb-1">スタイル: <span id="label-store" class="font-bold text-indigo-600">自炊派</span></label>
                <input type="range" id="input-store" min="0" max="2" value="0" class="w-full h-2 bg-indigo-100 rounded-lg appearance-none cursor-pointer" oninput="update()">
            </div>
            <div>
                <label class="flex justify-between text-sm mb-1">投資率: <span id="val-invest" class="font-bold">10</span>%</label>
                <input type="range" id="input-invest" min="0" max="50" value="10" class="w-full h-2 bg-indigo-100 rounded-lg appearance-none cursor-pointer" oninput="update()">
            </div>
        </div>

        <!-- 結果エリア -->
        <div class="grid grid-cols-2 gap-4 text-center">
            <div class="bg-indigo-50 p-3 rounded-xl">
                <p class="text-[10px] text-indigo-600 font-bold">10年後の資産</p>
                <p class="text-lg font-black" id="res-assets">¥0</p>
            </div>
            <div class="bg-emerald-50 p-3 rounded-xl">
                <p class="text-[10px] text-emerald-600 font-bold">健康寿命スコア</p>
                <p class="text-lg font-black" id="res-health">0</p>
            </div>
        </div>

        <!-- グラフエリア -->
        <div style="height: 200px; position: relative;">
            <canvas id="growthChart"></canvas>
        </div>

        <div id="advice-box" class="text-xs p-4 rounded-xl bg-slate-800 text-white leading-relaxed">
            計算中...
        </div>
    </div>

    <script>
        let growthChart = null;

        function initChart() {
            const ctx = document.getElementById('growthChart').getContext('2d');
            growthChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['今', '2年', '4年', '6年', '8年', '10年'],
                    datasets: [{
                        label: '資産推移',
                        data: [0, 0, 0, 0, 0, 0],
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function update() {
            if (!growthChart) return;

            // 値の取得
            const income = parseInt(document.getElementById('input-income').value);
            const storeMode = parseInt(document.getElementById('input-store').value);
            const investRate = parseInt(document.getElementById('input-invest').value) / 100;

            // 表示更新
            document.getElementById('val-income').innerText = income;
            document.getElementById('val-invest').innerText = Math.round(investRate * 100);

            // 1. FPロジック
            const takeHome = income * 0.8; // 手取り約8割と仮定
            let storeCost = [5, 8, 12][storeMode]; // 万
            let storeLabel = ["自炊派", "混合派", "外食・コンビニ派"][storeMode];
            document.getElementById('label-store').innerText = storeLabel;

            // 2. 資産計算
            const monthlyInvest = takeHome * investRate;
            let currentAssets = 0;
            let chartData = [];
            for (let i = 0; i <= 10; i++) {
                if (i % 2 === 0) chartData.push(Math.round(currentAssets));
                currentAssets = (currentAssets + (monthlyInvest * 12)) * 1.05; // 年利5%
            }

            // 3. UI反映
            document.getElementById('res-assets').innerText = "¥" + Math.round(currentAssets).toLocaleString() + "万";
            document.getElementById('res-health').innerText = [82, 79, 74][storeMode] + " 歳";

            // グラフ更新
            growthChart.data.datasets[0].data = chartData;
            growthChart.update();

            // アドバイス
            const advice = document.getElementById('advice-box');
            if(storeMode === 2) {
                advice.innerText = "⚠️コンビニ中心だと食費が月約" + storeCost + "万円かかり、健康寿命も低下傾向です。週2回自炊にするだけで投資余力が生まれます。";
            } else {
                advice.innerText = "✅効率的な資産形成です。このペースを維持すれば、10年後には強力なセーフティネットが完成します。";
            }
        }

        // 初期化
        window.onload = () => {
            initChart();
            update();
        };
    </script>
</body>
</html>
